<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>IRIS — AI Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --red: #ff2020;
    --gold: #ffd700;
    --blue: #00cfff;
    --dark: #020810;
    --border: rgba(0, 200, 255, 0.2);
    --glow: 0 0 20px rgba(0, 200, 255, 0.4);
    --glow-red: 0 0 20px rgba(255, 32, 32, 0.5);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--dark);
    color: #cceeff;
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow: hidden;
  }
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,200,255,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,200,255,0.04) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }
  .hud-corner { position: fixed; width: 80px; height: 80px; pointer-events: none; z-index: 1; }
  .hud-corner::before, .hud-corner::after { content: ''; position: absolute; background: var(--blue); opacity: 0.5; }
  .hud-corner.tl { top: 10px; left: 10px; }
  .hud-corner.tl::before { width: 2px; height: 100%; }
  .hud-corner.tl::after { width: 100%; height: 2px; }
  .hud-corner.tr { top: 10px; right: 10px; }
  .hud-corner.tr::before { width: 2px; height: 100%; right: 0; }
  .hud-corner.tr::after { width: 100%; height: 2px; }
  .hud-corner.bl { bottom: 10px; left: 10px; }
  .hud-corner.bl::before { width: 2px; height: 100%; bottom: 0; }
  .hud-corner.bl::after { width: 100%; height: 2px; bottom: 0; }
  .hud-corner.br { bottom: 10px; right: 10px; }
  .hud-corner.br::before { width: 2px; height: 100%; bottom: 0; right: 0; }
  .hud-corner.br::after { width: 100%; height: 2px; bottom: 0; }
  .arc-ring { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); border-radius: 50%; border: 1px solid rgba(0,200,255,0.07); pointer-events: none; z-index: 0; animation: ring-pulse 4s ease-in-out infinite; }
  .arc-ring:nth-child(1) { width: 300px; height: 300px; }
  .arc-ring:nth-child(2) { width: 240px; height: 240px; animation-delay: 0.6s; }
  .arc-ring:nth-child(3) { width: 180px; height: 180px; animation-delay: 1.2s; }
  @keyframes ring-pulse { 0%, 100% { border-color: rgba(0,200,255,0.06); } 50% { border-color: rgba(0,200,255,0.18); } }
  #app { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; align-items: center; padding: 20px; }
  #login-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; gap: 30px; }
  .iris-logo { font-family: 'Orbitron', monospace; font-size: clamp(48px, 10vw, 80px); font-weight: 900; color: var(--blue); text-shadow: 0 0 30px var(--blue), 0 0 60px rgba(0,200,255,0.3); letter-spacing: 0.2em; animation: pulse-logo 2.5s ease-in-out infinite; }
  @keyframes pulse-logo { 0%, 100% { text-shadow: 0 0 30px var(--blue), 0 0 60px rgba(0,200,255,0.3); } 50% { text-shadow: 0 0 60px var(--blue), 0 0 120px rgba(0,200,255,0.5); } }
  .iris-subtitle { font-size: 12px; letter-spacing: 0.4em; color: rgba(0,200,255,0.4); text-transform: uppercase; }
  .login-box { display: flex; flex-direction: column; align-items: center; gap: 14px; width: 100%; max-width: 300px; }
  .input-hud { width: 100%; background: rgba(0,200,255,0.05); border: 1px solid var(--border); border-radius: 4px; padding: 14px 20px; color: var(--blue); font-family: 'Rajdhani', sans-serif; font-size: 16px; font-weight: 600; letter-spacing: 0.15em; outline: none; text-align: center; transition: all 0.3s; }
  .input-hud:focus { border-color: var(--blue); box-shadow: var(--glow); background: rgba(0,200,255,0.1); }
  .input-hud::placeholder { color: rgba(0,200,255,0.3); }
  .btn-primary { width: 100%; padding: 14px; background: transparent; border: 2px solid var(--blue); border-radius: 4px; color: var(--blue); font-family: 'Orbitron', monospace; font-size: 13px; font-weight: 700; letter-spacing: 0.2em; cursor: pointer; transition: all 0.3s; }
  .btn-primary:hover { background: rgba(0,200,255,0.12); box-shadow: var(--glow); }
  .login-error { color: var(--red); font-size: 12px; letter-spacing: 0.1em; display: none; }
  #main-interface { display: none; flex-direction: column; width: 100%; max-width: 800px; height: 100vh; padding: 20px 0; }
  .iris-header { display: flex; align-items: center; justify-content: space-between; padding: 0 10px 15px; border-bottom: 1px solid var(--border); margin-bottom: 15px; flex-wrap: wrap; gap: 8px; }
  .iris-name { font-family: 'Orbitron', monospace; font-size: 22px; font-weight: 900; color: var(--blue); text-shadow: 0 0 20px var(--blue); letter-spacing: 0.15em; }
  .header-right { display: flex; align-items: center; gap: 8px; }
  .status-dot { display: flex; align-items: center; gap: 6px; font-size: 10px; color: rgba(0,200,255,0.5); letter-spacing: 0.12em; }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: #00ff88; box-shadow: 0 0 8px #00ff88; animation: blink 2s infinite; }
  @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
  .btn-icon { background: transparent; border: 1px solid var(--border); border-radius: 4px; color: rgba(0,200,255,0.4); padding: 5px 8px; cursor: pointer; font-size: 11px; font-family: 'Orbitron', monospace; letter-spacing: 0.08em; transition: all 0.3s; }
  .btn-icon:hover { border-color: var(--red); color: var(--red); }
  .wake-btn { background: transparent; border: 1px solid rgba(0,255,136,0.3); border-radius: 4px; color: rgba(0,255,136,0.5); padding: 5px 9px; cursor: pointer; font-size: 11px; font-family: 'Orbitron', monospace; letter-spacing: 0.08em; transition: all 0.3s; }
  .wake-btn.active { border-color: #00ff88; color: #00ff88; box-shadow: 0 0 10px rgba(0,255,136,0.3); }
  #chat-box { flex: 1; overflow-y: auto; padding: 10px; display: flex; flex-direction: column; gap: 12px; scrollbar-width: thin; scrollbar-color: rgba(0,200,255,0.15) transparent; }
  #chat-box::-webkit-scrollbar { width: 3px; }
  #chat-box::-webkit-scrollbar-thumb { background: rgba(0,200,255,0.2); border-radius: 2px; }
  .msg { display: flex; flex-direction: column; max-width: 85%; animation: msg-in 0.25s ease; }
  @keyframes msg-in { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.iris { align-self: flex-start; align-items: flex-start; }
  .msg-label { font-size: 10px; letter-spacing: 0.2em; margin-bottom: 4px; opacity: 0.45; font-family: 'Orbitron', monospace; }
  .msg.user .msg-label { color: var(--gold); }
  .msg.iris .msg-label { color: var(--blue); }
  .msg-bubble { padding: 11px 15px; border-radius: 4px; font-size: 15px; line-height: 1.6; }
  .msg.user .msg-bubble { background: rgba(255,215,0,0.07); border: 1px solid rgba(255,215,0,0.2); color: #ffe88a; border-radius: 4px 4px 0 4px; }
  .msg.iris .msg-bubble { background: rgba(0,200,255,0.06); border: 1px solid var(--border); color: #cceeff; border-radius: 4px 4px 4px 0; }
  .typing-indicator { display: none; align-self: flex-start; padding: 12px 18px; background: rgba(0,200,255,0.05); border: 1px solid var(--border); border-radius: 4px 4px 4px 0; }
  .typing-indicator span { display: inline-block; width: 6px; height: 6px; border-radius: 50%; background: var(--blue); margin: 0 2px; animation: bounce 1.1s infinite; }
  .typing-indicator span:nth-child(2) { animation-delay: 0.18s; }
  .typing-indicator span:nth-child(3) { animation-delay: 0.36s; }
  @keyframes bounce { 0%, 60%, 100% { transform: translateY(0); opacity: 0.3; } 30% { transform: translateY(-7px); opacity: 1; } }
  .input-bar { padding: 14px 10px 0; border-top: 1px solid var(--border); display: flex; gap: 8px; align-items: flex-end; }
  #text-input { flex: 1; background: rgba(0,200,255,0.04); border: 1px solid var(--border); border-radius: 4px; padding: 12px 15px; color: #cceeff; font-family: 'Rajdhani', sans-serif; font-size: 16px; outline: none; resize: none; max-height: 100px; transition: all 0.3s; scrollbar-width: none; }
  #text-input:focus { border-color: var(--blue); box-shadow: var(--glow); }
  #text-input::placeholder { color: rgba(0,200,255,0.2); }
  .send-btn { padding: 12px 16px; background: transparent; border: 2px solid var(--blue); border-radius: 4px; color: var(--blue); font-family: 'Orbitron', monospace; font-size: 11px; font-weight: 700; cursor: pointer; transition: all 0.3s; letter-spacing: 0.1em; }
  .send-btn:hover { background: rgba(0,200,255,0.12); box-shadow: var(--glow); }
  .voice-btn { padding: 12px 14px; background: transparent; border: 2px solid rgba(255,32,32,0.35); border-radius: 4px; color: var(--red); font-size: 17px; cursor: pointer; transition: all 0.3s; flex-shrink: 0; }
  .voice-btn.recording { border-color: var(--red); background: rgba(255,32,32,0.12); animation: pulse-red 0.9s infinite; }
  @keyframes pulse-red { 0%, 100% { box-shadow: 0 0 8px rgba(255,32,32,0.3); } 50% { box-shadow: 0 0 25px rgba(255,32,32,0.7); } }
  .status-bar { font-size: 10px; letter-spacing: 0.15em; color: rgba(0,200,255,0.3); text-align: center; padding: 8px 0 0; font-family: 'Orbitron', monospace; }
</style>
</head>
<body>
<div class="hud-corner tl"></div>
<div class="hud-corner tr"></div>
<div class="hud-corner bl"></div>
<div class="hud-corner br"></div>
<div class="arc-ring"></div>
<div class="arc-ring"></div>
<div class="arc-ring"></div>
<div id="app">
  <div id="login-screen">
    <div class="iris-logo">IRIS</div>
    <div class="iris-subtitle">Integrated Responsive Intelligence System</div>
    <div class="login-box">
      <input type="password" class="input-hud" id="pwd-input" placeholder="ACCESS CODE" autocomplete="off">
      <button class="btn-primary" onclick="doLogin()">INITIALIZE SYSTEM</button>
      <div class="login-error" id="login-error">⚠ ACCESS DENIED</div>
    </div>
  </div>
  <div id="main-interface">
    <div class="iris-header">
      <div class="iris-name">IRIS</div>
      <div class="header-right">
        <button class="wake-btn" id="wake-btn" onclick="toggleWakeWord()">👂 HEY IRIS</button>
        <div class="status-dot">
          <div class="dot"></div>
          <span id="status-text">ONLINE</span>
        </div>
        <button class="btn-icon" onclick="clearMemory()">⟳ RESET</button>
      </div>
    </div>
    <div id="chat-box">
      <div class="typing-indicator" id="typing">
        <span></span><span></span><span></span>
      </div>
    </div>
    <div class="input-bar">
      <textarea id="text-input" placeholder="Message IRIS..." rows="1"
        oninput="autoResize(this)" onkeydown="handleKey(event)"></textarea>
      <button class="voice-btn" id="voice-btn" onclick="toggleVoice()">🎤</button>
      <button class="send-btn" onclick="sendMessage()">SEND</button>
    </div>
    <div class="status-bar" id="status-bar">SAY "HEY IRIS" OR TYPE BELOW</div>
  </div>
</div>
<script>
let PASSWORD = "";
let isRecording = false;
let mediaRecorder = null;
let audioChunks = [];
let isSpeaking = false;
let currentAudio = null;
let wakeWordActive = false;
let wakeRecognition = null;

async function doLogin() {
  const pwd = document.getElementById("pwd-input").value.trim();
  if (!pwd) return;
  try {
    const r = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: "hello", password: pwd})
    });
    if (r.status === 401) {
      document.getElementById("login-error").style.display = "block";
      document.getElementById("pwd-input").value = "";
      return;
    }
    const data = await r.json();
    PASSWORD = pwd;
    document.getElementById("login-screen").style.display = "none";
    document.getElementById("main-interface").style.display = "flex";
    addMsg("iris", data.reply);
    speakText(data.reply);
    //setTimeout(() => startWakeWord(), 1500);
  } catch(e) {
    document.getElementById("login-error").style.display = "block";
  }
}

document.getElementById("pwd-input").addEventListener("keydown", e => {
  if (e.key === "Enter") doLogin();
});

function addMsg(who, text) {
  const box = document.getElementById("chat-box");
  const typing = document.getElementById("typing");
  const msg = document.createElement("div");
  msg.className = `msg ${who}`;
  msg.innerHTML = `<div class="msg-label">${who === "user" ? "BOSS" : "IRIS"}</div><div class="msg-bubble">${text}</div>`;
  box.insertBefore(msg, typing);
  box.scrollTop = box.scrollHeight;
}

  function showTyping(show) {
  document.getElementById("typing").style.display = show ? "flex" : "none";
  if (show) document.getElementById("chat-box").scrollTop = 99999;
}

function setStatus(text) {
  document.getElementById("status-text").textContent = text;
  document.getElementById("status-bar").textContent = text;
}

async function sendMessage() {
  const input = document.getElementById("text-input");
  const text = input.value.trim();
  if (!text || isSpeaking) return;
  input.value = "";
  input.style.height = "auto";
  addMsg("user", text);
  showTyping(true);
  setStatus("PROCESSING...");
  try {
    const res = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: text, password: PASSWORD})
    });
    const data = await res.json();
    showTyping(false);
    addMsg("iris", data.reply);
    setStatus("ONLINE");
    await speakText(data.reply);
  } catch(e) {
    showTyping(false);
    setStatus("ERROR");
  }
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function autoResize(el) {
  el.style.height = "auto";
  el.style.height = Math.min(el.scrollHeight, 100) + "px";
}

async function speakText(text) {
  if (!text) return;
  isSpeaking = true;
  setStatus("IRIS SPEAKING...");
  try {
    const res = await fetch("/speak", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: text, password: PASSWORD})
    });
    if (!res.ok) throw new Error("TTS fail");
    const blob = await res.blob();
    const url = URL.createObjectURL(blob);
    currentAudio = new Audio(url);
    await new Promise(resolve => {
      currentAudio.onended = resolve;
      currentAudio.onerror = resolve;
      currentAudio.play().catch(resolve);
    });
    URL.revokeObjectURL(url);
  } catch(e) { console.error("TTS:", e); }
  isSpeaking = false;
  setStatus(wakeWordActive ? 'LISTENING — SAY "HEY IRIS"' : "ONLINE");
}

async function toggleVoice() {
  if (isRecording) stopRecording();
  else startRecording();
}

  async function startRecording() {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({audio: true});
    audioChunks = [];
    const mimeType = MediaRecorder.isTypeSupported("audio/webm") ? "audio/webm" : "audio/ogg";
    mediaRecorder = new MediaRecorder(stream, {mimeType});
    mediaRecorder.ondataavailable = e => { if (e.data.size > 0) audioChunks.push(e.data); };
    mediaRecorder.onstop = async () => { stream.getTracks().forEach(t => t.stop()); await processVoice(); };
    mediaRecorder.start();
    isRecording = true;
    document.getElementById("voice-btn").classList.add("recording");
    document.getElementById("voice-btn").textContent = "⏹";
    setStatus("LISTENING... TAP ⏹ TO STOP");
  } catch(e) { setStatus("MIC PERMISSION DENIED"); }
}

function stopRecording() {
  if (mediaRecorder && isRecording) {
    mediaRecorder.stop();
    isRecording = false;
    document.getElementById("voice-btn").classList.remove("recording");
    document.getElementById("voice-btn").textContent = "🎤";
    setStatus("PROCESSING...");
  }
}

async function processVoice() {
  const blob = new Blob(audioChunks, {type: "audio/webm"});
  const base64 = await new Promise(resolve => {
    const reader = new FileReader();
    reader.onload = () => resolve(reader.result.split(",")[1]);
    reader.readAsDataURL(blob);
  });
  showTyping(true);
  try {
    const tRes = await fetch("/transcribe", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({audio_base64: base64, password: PASSWORD})
    });
    const tData = await tRes.json();
    if (!tData.text) { showTyping(false); setStatus('SAMAJH NAHI AAYI — RETRY'); return; }
    addMsg("user", tData.text);
    setStatus("PROCESSING...");
    const cRes = await fetch("/chat", {
      method: "POST",
      headers: {"Content-Type": "application/json"},
      body: JSON.stringify({message: tData.text, password: PASSWORD})
    });
    const cData = await cRes.json();
    showTyping(false);
    addMsg("iris", cData.reply);
    setStatus("ONLINE");
    await speakText(cData.reply);
  } catch(e) { showTyping(false); setStatus("ERROR"); }
}

  function startWakeWord() {
  if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
    setStatus("WAKE WORD NOT SUPPORTED — USE CHROME");
    return;
  }
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  wakeRecognition = new SR();
  wakeRecognition.continuous = true;
  wakeRecognition.interimResults = false;
  wakeRecognition.lang = 'hi-IN';
  wakeRecognition.onresult = (e) => {
    const said = e.results[e.results.length - 1][0].transcript.toLowerCase();
    const triggers = ["hey iris", "hey ires", "ey iris", "hi iris", "iris sun", "iris suno"];
    if (triggers.some(t => said.includes(t))) {
      if (!isRecording && !isSpeaking) {
        setStatus("WAKE WORD! LISTENING...");
        playBeep();
        setTimeout(() => startRecording(), 400);
      }
    }
  };
  wakeRecognition.onerror = (e) => { if (e.error !== 'no-speech') console.error(e.error); };
  wakeRecognition.onend = () => {
    if (wakeWordActive) setTimeout(() => { try { wakeRecognition.start(); } catch(e){} }, 800);
  };
  try {
    wakeRecognition.start();
    wakeWordActive = true;
    document.getElementById("wake-btn").classList.add("active");
    setStatus('LISTENING — SAY "HEY IRIS"');
  } catch(e) { console.error(e); }
}

function stopWakeWord() {
  wakeWordActive = false;
  if (wakeRecognition) { try { wakeRecognition.stop(); } catch(e){} wakeRecognition = null; }
  document.getElementById("wake-btn").classList.remove("active");
  setStatus("WAKE WORD OFF");
}

function playBeep() {
  try {
    const ctx = new (window.AudioContext || window.webkitAudioContext)();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.frequency.value = 880;
    gain.gain.setValueAtTime(0.1, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
    osc.start(ctx.currentTime);
    osc.stop(ctx.currentTime + 0.15);
  } catch(e) {}
}

async function clearMemory() {
  if (!confirm("Memory clear karna hai?")) return;
  await fetch(`/memory?password=${PASSWORD}`, {method: "DELETE"});
  addMsg("iris", "Memory clear kar di Boss! Fresh start!");
}
</script>
</body>
</html>
